<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <label class="theme-switch">
        <input type="checkbox" id="theme-toggle">
        <span class="slider"></span>
    </label>

    <label for="password-input">Пароль:</label>
    <div class="input-wrapper">
    <input type="password" id="password-input" placeholder="Введите пароль">
    
    <span id="toggle-password" class="password-toggle">
        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22"></path>
            <path d="M12.01 8.637a3.36 3.36 0 0 1 1.116.326M14.99 12.01a3.36 3.36 0 0 1-.326 1.116"></path>
        </svg>
    </span>

    <div class="strength-meter">
        <div id="strength-bar" class="bar"></div>
    </div>

    <span id="error-message" class="error-text"></span>
</div>

    <script src="script.js"></script>
</body>
</html>
